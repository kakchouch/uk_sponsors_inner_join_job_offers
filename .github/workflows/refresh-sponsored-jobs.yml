name: Refresh Sponsored Jobs Report

on:
  schedule:
    - cron: "17 3 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-sponsored-jobs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate sponsored jobs report
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
        run: |
          python generate_sponsored_jobs_report.py \
            --locations-file input/focus_locations.json \
            --max-pages 50

      - name: Commit changes if needed
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            output/reports/matched_sponsored_jobs.json \
            output/reports/sponsored_jobs_report.md \
            output/site/content/report.md

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: refresh sponsored jobs report"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push changes with merge-based conflict handling
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if git push origin "HEAD:${BRANCH_NAME}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi

            echo "Push failed on attempt ${attempt}. Fetching and merging latest origin/${BRANCH_NAME}."
            git fetch origin "${BRANCH_NAME}"

            if git merge --no-edit "origin/${BRANCH_NAME}"; then
              echo "Merge completed without conflicts. Retrying push."
              continue
            fi

            echo "Merge conflicts detected. Resolving generated artifacts by keeping local regenerated versions."
            conflicted_files="$(git diff --name-only --diff-filter=U || true)"

            if [[ -z "${conflicted_files}" ]]; then
              echo "Merge failed but no conflicted files detected."
              exit 1
            fi

            while IFS= read -r file_path; do
              case "${file_path}" in
                output/reports/matched_sponsored_jobs.json|output/reports/sponsored_jobs_report.md|output/site/content/report.md)
                  git checkout --ours -- "${file_path}"
                  ;;
                *)
                  git checkout --theirs -- "${file_path}"
                  ;;
              esac
              git add "${file_path}"
            done <<< "${conflicted_files}"

            git commit -m "chore: resolve report refresh merge conflicts"
          done

          echo "Unable to push after 3 attempts."
          exit 1