name: Refresh Market Analytics

on:
  workflow_run:
    workflows: ["Refresh Sponsored Jobs Report"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      keywords:
        description: Keyword filter label to include in the analytics report
        required: false
        default: software engineer

permissions:
  contents: write

concurrency:
  group: refresh-market-analytics-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analytics:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository at triggering commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set analytics keyword label
        run: |
          keywords="${{ github.event.inputs.keywords }}"
          if [ -z "$keywords" ]; then
            keywords="software engineer"
          fi
          echo "FILTER_KEYWORDS=$keywords" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate market analytics outputs
        run: |
          python generate_market_analytics.py \
            --matched-json-input output/reports/matched_sponsored_jobs.json \
            --keywords "$FILTER_KEYWORDS"

      - name: Commit changes if needed
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            output/reports/market_analytics.json \
            output/reports/market_analytics_report.md \
            output/site/content/analytics.md \
            output/site/static/charts/match_quality.png \
            output/site/static/charts/top_employers.png \
            output/site/static/charts/top_locations.png

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: refresh market analytics"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push changes with merge-based conflict handling
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if git push origin "HEAD:${BRANCH_NAME}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi

            echo "Push failed on attempt ${attempt}. Fetching and merging latest origin/${BRANCH_NAME}."
            git fetch origin "${BRANCH_NAME}"

            if git merge --no-edit "origin/${BRANCH_NAME}"; then
              echo "Merge completed without conflicts. Retrying push."
              continue
            fi

            echo "Merge conflicts detected. Resolving generated analytics artifacts by keeping local regenerated versions."
            conflicted_files="$(git diff --name-only --diff-filter=U || true)"

            if [[ -z "${conflicted_files}" ]]; then
              echo "Merge failed but no conflicted files detected."
              exit 1
            fi

            while IFS= read -r file_path; do
              case "${file_path}" in
                output/reports/market_analytics.json|output/reports/market_analytics_report.md|output/site/content/analytics.md|output/site/static/charts/match_quality.png|output/site/static/charts/top_employers.png|output/site/static/charts/top_locations.png)
                  git checkout --ours -- "${file_path}"
                  ;;
                *)
                  git checkout --theirs -- "${file_path}"
                  ;;
              esac
              git add "${file_path}"
            done <<< "${conflicted_files}"

            git commit -m "chore: resolve market analytics merge conflicts"
          done

          echo "Unable to push after 3 attempts."
          exit 1