{{ define "main" }}
    <header class="content__header">
        <h1>{{ .Title }}</h1>
    </header>

    <div class="content__body">
        {{ with .Params.last_research_at }}
            <p><strong>Last research run (UTC):</strong> {{ . }}</p>
        {{ end }}

        {{ .Content }}
    </div>
{{ end }}

{{ define "aside" }}
    <p>This report is rendered from Markdown content in site/content/report.md.</p>
{{ end }}
